<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test JavaScript</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #f7f4ef; color: #2d2a26; }
    .box { max-width: 720px; margin: 0 auto; background: white; border: 1px solid #ddd2c5; border-radius: 16px; padding: 24px; }
    h1 { margin-top: 0; }
    button { border: 0; border-radius: 999px; padding: 14px 18px; background: #9b7b5a; color: white; font-weight: 700; cursor: pointer; }
    #out { margin-top: 16px; padding: 12px; border: 1px solid #eee2d6; border-radius: 12px; min-height: 24px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Test JavaScript base</h1>
    <p>Se questa pagina funziona, il testo qui sotto cambia da solo e il pulsante risponde.</p>
    <button id="btn" type="button">Premi qui</button>
    <div id="out">Se vedi ancora questa frase, JavaScript non sta partendo.</div>
  </div>

  <script>
    document.getElementById("out").textContent = "JavaScript attivo.";
    document.getElementById("btn").addEventListener("click", function () {
      document.getElementById("out").textContent = "Pulsante cliccato correttamente.";
      alert("Test riuscito");
    });
  </script>
</body>
</html>
