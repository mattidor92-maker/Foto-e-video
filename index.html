<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload foto/video</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f7f4ef; color: #2d2a26; }
    .wrap { max-width: 960px; margin: 0 auto; display: grid; gap: 16px; }
    .card { background: white; border: 1px solid #ddd2c5; border-radius: 16px; padding: 18px; }
    h1, h2 { margin: 0 0 10px; }
    .row { display: grid; gap: 10px; }
    button { border: 0; border-radius: 999px; padding: 12px 16px; background: #9b7b5a; color: white; font-weight: 700; cursor: pointer; }
    .secondary { background: #fff; color: #7e6247; border: 1px solid #d8c8b6; }
    .ok { color: #216c3b; }
    .err { color: #a12f2f; }
    .info { color: #6c5a4b; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .item { background: #faf8f5; border: 1px solid #eee2d6; border-radius: 12px; overflow: hidden; }
    .item img, .item video, .fallback { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; background: #efe7dc; }
    .fallback { display: grid; place-items: center; font-size: 30px; }
    .meta { padding: 10px; font-size: 12px; }
    .name { font-weight: 700; margin-bottom: 4px; word-break: break-word; }
    .status { padding: 12px; border-radius: 12px; border: 1px solid #eee2d6; background: #faf8f5; }
    pre { white-space: pre-wrap; word-break: break-word; background: #faf8f5; border: 1px solid #eee2d6; border-radius: 12px; padding: 12px; min-height: 80px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Condividi con noi i tuoi ricordi!</h1>
    </div>

    <div class="card">
      <h2>Carica Foto/Video</h2>
      <div class="row">
        <input id="media" type="file" accept="image/*,video/*" multiple />
        <button id="uploadBtn" type="button">Invia contenuti</button>
        <div id="status" class="status info">Pronto.</div>
      </div>
    </div>

    <div class="card">
      <h2>Galleria</h2>
      <div class="row">
        <button id="reloadBtn" class="secondary" type="button">Aggiorna</button>
        <div id="galleryInfo" class="status info">Caricamento...</div>
        <div id="gallery" class="grid"></div>
      </div>
    </div>

    <div class="card">
      <h2>Log tecnico</h2>
      <pre id="log"></pre>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://nfwkbcnmegmcbsaolani.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_crCk7XsqLxoBF-F-oJZoSg_e5amHcIb";
    const BUCKET_NAME = "FOTOEVENTO";

    const media = document.getElementById("media");
    const uploadBtn = document.getElementById("uploadBtn");
    const reloadBtn = document.getElementById("reloadBtn");
    const statusBox = document.getElementById("status");
    const galleryInfo = document.getElementById("galleryInfo");
    const gallery = document.getElementById("gallery");
    const logBox = document.getElementById("log");

    function log(line) {
      logBox.textContent += line + "\n";
      console.log(line);
    }

    function setStatus(text, cls) {
      statusBox.className = "status " + (cls || "info");
      statusBox.textContent = text;
    }

    function setGalleryInfo(text, cls) {
      galleryInfo.className = "status " + (cls || "info");
      galleryInfo.textContent = text;
    }

    function isImage(name, type) {
      const n = name || "";
      const t = type || "";
      return t.startsWith("image/") || /\.(jpg|jpeg|png|gif|webp|heic|heif)$/i.test(n);
    }

    function isVideo(name, type) {
      const n = name || "";
      const t = type || "";
      return t.startsWith("video/") || /\.(mp4|mov|webm|m4v|3gp|avi)$/i.test(n);
    }

    function isPlaceholder(name) {
      return !name || name === ".emptyFolderPlaceholder";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    log("Init Supabase OK");
    log("Bucket: " + BUCKET_NAME);

    async function loadGallery() {
      gallery.innerHTML = "";
      setGalleryInfo("Caricamento galleria...", "info");

      try {
        const res = await supabase.storage.from(BUCKET_NAME).list("", {
          limit: 100,
          offset: 0,
          sortBy: { column: "created_at", order: "desc" }
        });

        log("LIST: " + JSON.stringify(res, null, 2));

        if (res.error) {
          setGalleryInfo("Errore lettura bucket: " + res.error.message, "err");
          return;
        }

        const items = (res.data || []).filter(item => item && item.name && !isPlaceholder(item.name));

        if (!items.length) {
          setGalleryInfo("Nessun file visibile nel bucket.", "info");
          return;
        }

        setGalleryInfo("File trovati: " + items.length, "ok");

        items.forEach(item => {
          const box = document.createElement("div");
          box.className = "item";

          const publicUrl = supabase.storage.from(BUCKET_NAME).getPublicUrl(item.name).data.publicUrl;
          const mime = item.metadata && item.metadata.mimetype ? item.metadata.mimetype : "";

          let mediaHtml = "";
          if (isVideo(item.name, mime)) {
            mediaHtml = '<video controls playsinline preload="metadata" src="' + publicUrl + '"></video>';
          } else if (/\.(heic|heif)$/i.test(item.name)) {
            mediaHtml = '<div class="fallback">🖼</div>';
          } else {
            mediaHtml = '<img src="' + publicUrl + '" alt="' + escapeHtml(item.name) + '" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'fallback\',textContent:\'🖼\'}))">';
          }

          const createdAt = item.created_at ? new Date(item.created_at).toLocaleString("it-IT") : "Data non disponibile";

          box.innerHTML = mediaHtml + '<div class="meta"><div class="name">' + escapeHtml(item.name) + '</div><div>' + createdAt + '</div></div>';
          gallery.appendChild(box);
        });
      } catch (e) {
        log("LIST ERROR: " + (e.message || String(e)));
        setGalleryInfo("Errore generale: " + (e.message || String(e)), "err");
      }
    }

    async function uploadFiles() {
      const files = Array.from(media.files || []);
      if (!files.length) {
        setStatus("Seleziona almeno un file.", "err");
        return;
      }

      setStatus("Upload in corso...", "info");
      uploadBtn.disabled = true;

      try {
        for (const file of files) {
          const safeName = "upload-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8) + "-" + file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
          const res = await supabase.storage.from(BUCKET_NAME).upload(safeName, file, {
            cacheControl: "3600",
            upsert: false,
            contentType: file.type || "application/octet-stream"
          });

          log("UPLOAD " + safeName + ": " + JSON.stringify(res, null, 2));

          if (res.error) {
            throw new Error(res.error.message);
          }
        }

        setStatus("Upload riuscito.", "ok");
        media.value = "";
        await loadGallery();
      } catch (e) {
        setStatus("Errore upload: " + (e.message || String(e)), "err");
        log("UPLOAD ERROR: " + (e.message || String(e)));
      } finally {
        uploadBtn.disabled = false;
      }
    }

    reloadBtn.addEventListener("click", loadGallery);
    uploadBtn.addEventListener("click", uploadFiles);

    loadGallery();
  </script>
</body>
</html>
