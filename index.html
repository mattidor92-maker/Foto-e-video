<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnostica Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f7f4ef; color: #2d2a26; }
    .wrap { max-width: 900px; margin: 0 auto; display: grid; gap: 16px; }
    .card { background: white; border: 1px solid #ddd2c5; border-radius: 16px; padding: 18px; }
    h1, h2 { margin: 0 0 10px; }
    .row { display: grid; gap: 10px; }
    input[type="file"] { width: 100%; }
    button { border: 0; border-radius: 999px; padding: 12px 16px; background: #9b7b5a; color: white; font-weight: 700; cursor: pointer; }
    .ok { color: #216c3b; }
    .err { color: #a12f2f; }
    .info { color: #6c5a4b; }
    pre { white-space: pre-wrap; word-break: break-word; background: #faf8f5; border: 1px solid #eee2d6; border-radius: 12px; padding: 12px; min-height: 100px; }
    ul { margin: 0; padding-left: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Diagnostica collegamento Supabase</h1>
      <div id="summary" class="row"></div>
    </div>

    <div class="card">
      <h2>Test bucket</h2>
      <div class="row">
        <div><strong>URL:</strong> <span id="urlOut"></span></div>
        <div><strong>Bucket:</strong> <span id="bucketOut"></span></div>
        <button id="runTestsBtn" type="button">Esegui test</button>
      </div>
      <div id="testsOut" class="row"></div>
    </div>

    <div class="card">
      <h2>Test upload</h2>
      <div class="row">
        <input id="media" type="file" accept="image/*,video/*" />
        <button id="uploadBtn" type="button">Carica file di test</button>
      </div>
      <div id="uploadOut" class="row"></div>
    </div>

    <div class="card">
      <h2>Ultimi file visti nel bucket</h2>
      <div id="filesOut"></div>
    </div>

    <div class="card">
      <h2>Log tecnico</h2>
      <pre id="logOut"></pre>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://nfwkbcnmegmcbsaolani.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_crCk7XsqLxoBF-F-oJZoSg_e5amHcIb";
    const BUCKET_NAME = "FOTOEVENTO";

    const summary = document.getElementById("summary");
    const urlOut = document.getElementById("urlOut");
    const bucketOut = document.getElementById("bucketOut");
    const testsOut = document.getElementById("testsOut");
    const filesOut = document.getElementById("filesOut");
    const logOut = document.getElementById("logOut");
    const uploadOut = document.getElementById("uploadOut");
    const media = document.getElementById("media");
    const runTestsBtn = document.getElementById("runTestsBtn");
    const uploadBtn = document.getElementById("uploadBtn");

    function log(line) {
      logOut.textContent += line + "\n";
      console.log(line);
    }

    function row(text, cls) {
      const div = document.createElement("div");
      div.className = cls || "info";
      div.textContent = text;
      return div;
    }

    urlOut.textContent = SUPABASE_URL;
    bucketOut.textContent = BUCKET_NAME;

    let supabase = null;
    try {
      if (!window.supabase || !window.supabase.createClient) {
        throw new Error("Libreria Supabase non caricata");
      }
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      summary.appendChild(row("Supabase inizializzato correttamente.", "ok"));
      log("Init OK");
    } catch (e) {
      summary.appendChild(row("Errore inizializzazione: " + (e.message || String(e)), "err"));
      log("Errore init: " + (e.message || String(e)));
    }

    async function runTests() {
      testsOut.innerHTML = "";
      filesOut.innerHTML = "";
      log("Avvio test bucket");

      if (!supabase) {
        testsOut.appendChild(row("Supabase non inizializzato.", "err"));
        return;
      }

      try {
        const listRes = await supabase.storage.from(BUCKET_NAME).list("", {
          limit: 20,
          offset: 0,
          sortBy: { column: "created_at", order: "desc" }
        });

        log("Risposta list(): " + JSON.stringify(listRes, null, 2));

        if (listRes.error) {
          testsOut.appendChild(row("Errore lettura bucket: " + listRes.error.message, "err"));
          return;
        }

        testsOut.appendChild(row("Connessione a Supabase riuscita.", "ok"));
        testsOut.appendChild(row("Lettura del bucket riuscita.", "ok"));

        const items = (listRes.data || []).filter(function(x) { return x && x.name; });
        testsOut.appendChild(row("File trovati nella root del bucket: " + items.length, items.length ? "ok" : "info"));

        if (!items.length) {
          filesOut.appendChild(row("Nessun file trovato nella root del bucket.", "info"));
        } else {
          const ul = document.createElement("ul");
          items.forEach(function(item) {
            const li = document.createElement("li");
            li.textContent = item.name + " — " + (item.created_at || "data non disponibile");
            ul.appendChild(li);
          });
          filesOut.appendChild(ul);
        }
      } catch (e) {
        testsOut.appendChild(row("Errore generale test: " + (e.message || String(e)), "err"));
        log("Errore test: " + (e.message || String(e)));
      }
    }

    async function uploadTest() {
      uploadOut.innerHTML = "";
      const file = media.files && media.files[0];

      if (!file) {
        uploadOut.appendChild(row("Seleziona un file prima del test upload.", "err"));
        return;
      }

      if (!supabase) {
        uploadOut.appendChild(row("Supabase non inizializzato.", "err"));
        return;
      }

      try {
        const safeName = "test-" + Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
        log("Tentativo upload: " + safeName);

        const res = await supabase.storage.from(BUCKET_NAME).upload(safeName, file, {
          cacheControl: "3600",
          upsert: false,
          contentType: file.type || "application/octet-stream"
        });

        log("Risposta upload(): " + JSON.stringify(res, null, 2));

        if (res.error) {
          uploadOut.appendChild(row("Errore upload: " + res.error.message, "err"));
          return;
        }

        uploadOut.appendChild(row("Upload riuscito: " + safeName, "ok"));
      } catch (e) {
        uploadOut.appendChild(row("Errore generale upload: " + (e.message || String(e)), "err"));
        log("Errore upload: " + (e.message || String(e)));
      }
    }

    runTestsBtn.addEventListener("click", runTests);
    uploadBtn.addEventListener("click", uploadTest);
  </script>
</body>
</html>
